# fly.toml app configuration file generated for pulso-eleitoral on 2026-06-16T20:53:42-03:00
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'pulso-eleitoral'
primary_region = 'gru'

[build]

[env]
  FLASK_ENV = 'production'
  PORT = '8080'

[[mounts]]
  source = 'pulso_data'
  destination = '/data'

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = 'off'
  auto_start_machines = true
  min_machines_running = 0

[[vm]]
  memory = '512mb'
  cpu_kind = 'shared'
  cpus = 1
  memory_mb = 512
