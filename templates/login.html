<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login — Pulso Eleitoral</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="{{ url_for('static', filename='css/tokens.css') }}">
  <link rel="stylesheet" href="{{ url_for('static', filename='css/base.css') }}">
  <style>
    .login-container {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
      background: var(--pe-bg);
    }
    .login-card {
      width: 100%;
      max-width: 380px;
      padding: 32px;
      background: var(--pe-surface-2);
      border: 1px solid var(--pe-surface);
      border-radius: 6px;
    }
    .login-header {
      text-align: center;
      margin-bottom: 24px;
    }
    .login-logo {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 44px;
      height: 44px;
      background: var(--pe-navy);
      border-radius: 6px;
      margin-bottom: 12px;
    }
    .login-title {
      font-size: 22px;
      font-weight: 500;
      color: var(--pe-navy);
      margin-bottom: 4px;
    }
    .login-subtitle {
      font-size: 11px;
      color: var(--pe-text-muted);
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }
    .form-group {
      margin-bottom: 16px;
    }
    .form-label {
      display: block;
      font-size: 11px;
      font-weight: 500;
      color: var(--pe-text-muted);
      text-transform: uppercase;
      letter-spacing: 0.05em;
      margin-bottom: 6px;
    }
    .form-input {
      width: 100%;
      padding: 8px 12px;
      font-size: 14px;
      font-family: 'Inter', sans-serif;
      border: 1px solid var(--pe-surface);
      border-radius: 4px;
      background: var(--pe-surface-2);
      color: var(--pe-text);
      outline: none;
      transition: border-color 0.15s;
    }
    .form-input:focus {
      border-color: var(--pe-navy);
    }
    .login-error {
      font-size: 11px;
      color: var(--pe-down);
      margin-bottom: 16px;
      padding: 8px 12px;
      background: #FCEBEB;
      border-left: 2px solid var(--pe-down);
      border-radius: 0 4px 4px 0;
    }
    .login-btn {
      width: 100%;
      padding: 10px;
      font-size: 13px;
      font-weight: 500;
      background: var(--pe-navy);
      color: #fff;
      border: none;
      border-radius: 4px;
      cursor: pointer;
      transition: background-color 0.15s;
    }
    .login-btn:hover {
      background: var(--pe-navy-light);
    }
  </style>
</head>
<body class="pe-page">
  <div class="login-container">
    <div class="login-card">
      <div class="login-header">
        <div class="login-logo">
          <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="var(--pe-red)" stroke-width="3" stroke-linecap="round" stroke-linejoin="round">
            <path d="M22 12h-4l-3 9L9 3l-3 9H2"/>
          </svg>
        </div>
        <h1 class="login-title">Pulso Eleitoral</h1>
        <p class="login-subtitle">Acesso Restrito</p>
      </div>

      {% if error %}
      <div class="login-error">
        {{ error }}
      </div>
      {% endif %}

      <form action="{{ url_for('login') }}" method="POST">
        <div class="form-group">
          <label for="username" class="form-label">Usuário</label>
          <input type="text" id="username" name="username" class="form-input" required autofocus>
        </div>
        <div class="form-group">
          <label for="password" class="form-label">Senha</label>
          <input type="password" id="password" name="password" class="form-input" required>
        </div>
        <button type="submit" class="login-btn">Entrar</button>
      </form>
    </div>
  </div>
</body>
</html>
